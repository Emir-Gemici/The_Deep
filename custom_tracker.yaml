# Gelismis tracker — detection-miss'lerde ID kaybini azaltir (ID switching fix)
tracker_type: botsort
track_high_thresh: 0.2
track_low_thresh: 0.1
new_track_thresh: 0.25
track_buffer: 120          # kayip track'i ~4sn (30fps) canli tut -> gap sonrasi ayni ID
match_thresh: 0.8
fuse_score: True
gmc_method: sparseOptFlow
proximity_thresh: 0.5
appearance_thresh: 0.25
with_reid: True            # gorunum tabanli yeniden-eslestirme (motion drift'e ragmen ayni ID)
model: auto
